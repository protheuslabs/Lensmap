name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: lensmap
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: lensmap
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: lensmap
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: lensmap.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          name="lensmap-${version}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/lensmap" "$name"
          tar -czf "dist/${name}.tar.gz" "$name"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME"
          $name = "lensmap-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/lensmap.exe" "$name.exe"
          Compress-Archive -Path "$name.exe" -DestinationPath "dist/$name.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
